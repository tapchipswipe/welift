# fly launch --config fly.toml  (from webhook/)
app = "welift-gate-webhook"
primary_region = "mia"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[env]
  SERVERLESS = "true"
  DEFAULT_COMMUNITY = "The Inlets"
  VERIFY_RETELL_SIGNATURES = "true"
